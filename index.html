<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>채널 영상 순위</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 18px 24px;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: #0d0d0d;
      z-index: 10;
    }

    .header-left h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    .header-left .sub { font-size: 0.75rem; color: #555; margin-top: 3px; }

    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

    .refresh-btn {
      background: #ff2d2d;
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: #e00; }
    .refresh-btn:disabled { background: #444; cursor: default; }

    .countdown { font-size: 0.72rem; color: #555; }

    .controls {
      padding: 12px 24px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .controls label { font-size: 0.82rem; color: #777; }

    .controls input[type="date"] {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .summary-bar {
      padding: 8px 24px;
      font-size: 0.75rem;
      color: #444;
      border-bottom: 1px solid #151515;
    }

    /* 카드 리스트 */
    .video-list {
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .video-card {
      background: #161616;
      border: 1px solid #202020;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: border-color 0.15s;
    }
    .video-card:hover { border-color: #333; }

    .rank {
      font-size: 1.1rem;
      font-weight: 800;
      min-width: 32px;
      text-align: center;
      padding-top: 4px;
      color: #3a3a3a;
    }
    .rank.gold   { color: #ffd700; }
    .rank.silver { color: #c0c0c0; }
    .rank.bronze { color: #cd7f32; }

    .thumb {
      width: 128px;
      min-width: 128px;
      height: 72px;
      border-radius: 6px;
      object-fit: cover;
      background: #1e1e1e;
    }

    .info { flex: 1; min-width: 0; }

    .channel-badge {
      display: inline-block;
      font-size: 0.68rem;
      color: #999;
      background: #202020;
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 5px;
    }

    .video-title {
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.45;
      margin-bottom: 7px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-title a { color: #ddd; text-decoration: none; }
    .video-title a:hover { color: #fff; text-decoration: underline; }

    .stats {
      display: flex;
      gap: 14px;
      font-size: 0.77rem;
      color: #666;
    }
    .views { color: #ff8c00; font-weight: 700; }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: #444;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #222;
      border-top-color: #ff2d2d;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 에러 */
    .error-box {
      margin: 0 0 10px;
      background: #1e1010;
      border: 1px solid #3d1a1a;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.8rem;
      color: #ff7777;
    }

    /* 없음 */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: #444;
      font-size: 0.9rem;
    }

    /* 채널 관리 패널 */
    .channel-panel {
      margin: 0 24px 10px;
      background: #161616;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 14px;
    }
    .channel-panel h3 { font-size: 0.82rem; color: #777; margin-bottom: 10px; }
    .channel-tags { display: flex; flex-wrap: wrap; gap: 7px; }
    .channel-tag {
      display: flex; align-items: center; gap: 5px;
      background: #202020; border: 1px solid #2e2e2e;
      border-radius: 6px; padding: 4px 9px;
      font-size: 0.78rem; color: #bbb;
    }
    .channel-tag .remove {
      cursor: pointer; color: #555; font-size: 0.9rem; line-height: 1;
      transition: color 0.1s;
    }
    .channel-tag .remove:hover { color: #ff5555; }
    .add-channel-row { display: flex; gap: 7px; margin-top: 10px; }
    .add-channel-row input {
      flex: 1; background: #1a1a1a; border: 1px solid #2e2e2e;
      color: #e0e0e0; padding: 6px 10px; border-radius: 6px; font-size: 0.8rem;
    }
    .add-channel-row input::placeholder { color: #444; }
    .add-channel-row button {
      background: #252525; border: 1px solid #333; color: #aaa;
      padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
    }
    .add-channel-row button:hover { background: #2e2e2e; color: #fff; }

    .toggle-panel-btn {
      background: none; border: none; color: #555; font-size: 0.78rem;
      cursor: pointer; padding: 0; text-decoration: underline;
    }
    .toggle-panel-btn:hover { color: #aaa; }

    .period-tabs { display: flex; gap: 6px; }
    .period-btn {
      background: #1a1a1a; border: 1px solid #2e2e2e; color: #666;
      padding: 6px 16px; border-radius: 6px; cursor: pointer;
      font-size: 0.82rem; font-weight: 600; transition: all 0.15s;
    }
    .period-btn:hover { border-color: #444; color: #aaa; }
    .period-btn.active { background: #ff2d2d; border-color: #ff2d2d; color: #fff; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📊 채널 영상 순위</h1>
    <div class="sub" id="lastUpdated">-</div>
  </div>
  <div class="header-right">
    <div style="display:flex; gap:8px; align-items:center;">
      <button onclick="showApiSetup()" title="API 키 설정" style="background:#1a1a1a;border:1px solid #2e2e2e;color:#888;border-radius:6px;padding:7px 10px;cursor:pointer;font-size:0.82rem;">⚙️</button>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll(true)">새로고침</button>
    </div>
    <div class="countdown" id="countdown"></div>
  </div>
</header>

<div id="apiSetup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center;">
  <div style="background:#161616; border:1px solid #2a2a2a; border-radius:12px; padding:28px; max-width:440px; width:90%;">
    <h2 style="font-size:1.05rem; margin-bottom:8px;">🔑 YouTube API 키 입력</h2>
    <p style="font-size:0.82rem; color:#888; line-height:1.6; margin-bottom:16px;">
      이 도구는 YouTube Data API 키가 필요합니다. 한 번 입력하면 이 브라우저에 저장돼요.<br>
      <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:#6ab0ff;">구글 클라우드 콘솔에서 발급 →</a>
    </p>
    <input type="text" id="apiKeyInput" placeholder="AIza..." onkeydown="if(event.key==='Enter') saveApiKey()" style="width:100%; box-sizing:border-box; background:#1a1a1a; border:1px solid #2e2e2e; color:#e0e0e0; padding:10px 12px; border-radius:8px; font-size:0.85rem; margin-bottom:14px;">
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button onclick="closeApiSetup()" style="background:#222; border:1px solid #333; color:#999; padding:8px 14px; border-radius:8px; cursor:pointer;">취소</button>
      <button onclick="saveApiKey()" style="background:#ff2d2d; border:none; color:#fff; padding:8px 18px; border-radius:8px; cursor:pointer; font-weight:600;">저장</button>
    </div>
  </div>
</div>

<div class="controls">
  <div class="period-tabs">
    <button class="period-btn active" id="btn1d" onclick="setPeriod(1)">오늘</button>
    <button class="period-btn" id="btn7d" onclick="setPeriod(7)">7일</button>
    <button class="period-btn" id="btn30d" onclick="setPeriod(30)">30일</button>
  </div>
  <button class="toggle-panel-btn" onclick="togglePanel()">채널 관리 ▾</button>
</div>

<div class="channel-panel" id="channelPanel" style="display:none;">
  <h3>모니터링 채널 목록</h3>
  <div class="channel-tags" id="channelTags"></div>
  <div class="add-channel-row">
    <input type="text" id="newChannelInput" placeholder="@채널핸들 또는 채널명" onkeydown="if(event.key==='Enter') addChannel()">
    <button onclick="addChannel()">추가</button>
  </div>
</div>

<div class="summary-bar" id="summaryBar"> </div>

<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div>채널 데이터 불러오는 중...</div>
  </div>
</div>

<script>
const API_STORAGE = 'yt_api_key';
let API_KEY = localStorage.getItem(API_STORAGE) || '';
const STORAGE_KEY = 'yt_dashboard_channels';
const REFRESH_INTERVAL = 30 * 60; // 30분 (초)
const VIDEO_CACHE_KEY = 'yt_video_cache';
const CACHE_TTL_MS = REFRESH_INTERVAL * 1000;
const CH_INFO_CACHE_KEY = 'yt_ch_info_cache'; // 채널 메타(playlistId) 영구 캐시

// API 키 설정 (코드에 박지 않고 브라우저에 저장)
function showApiSetup() {
  document.getElementById('apiKeyInput').value = API_KEY || '';
  document.getElementById('apiSetup').style.display = 'flex';
  setTimeout(() => document.getElementById('apiKeyInput').focus(), 50);
}
function closeApiSetup() {
  document.getElementById('apiSetup').style.display = 'none';
}
function saveApiKey() {
  const v = document.getElementById('apiKeyInput').value.trim();
  if (!v) return;
  API_KEY = v;
  localStorage.setItem(API_STORAGE, v);
  channelCache = {};
  closeApiSetup();
  loadAll();
}

// 선택 영상 → 알파컷으로
// 유저스크립트(alphacut-autofill) 설치 시: 링크가 자동 입력됨.
// 미설치 시: 클립보드에 복사돼 있으니 붙여넣기(Ctrl+V)만.
function sendToAlphacut(videoId) {
  const url = 'https://www.youtube.com/watch?v=' + videoId;
  if (navigator.clipboard) navigator.clipboard.writeText(url).catch(() => {});
  window.open('https://alphacut.video/my_project#yt=' + encodeURIComponent(url), '_blank', 'noopener');
}

// 기본 채널 목록 (YouTube API로 검증된 핸들)
const DEFAULT_CHANNELS = [
  '@speaks_tv',          // 스픽스
  '@ssroad',             // 김성수TV 성수대로
  '@tv-yc8no',           // 최한욱TV
  '@tv70',               // 김두일tv
  '@sisasuddenrush',     // 시사급발진
  '@정치타파tv-2424',     // 정치타파TV
  '@tv-og5md',           // 이송원TV
  '@시사의품격',          // 시사의품격
  '@repoacttv',          // TV허재현
  '@thekyunghyangtv',    // 경향TV
  '@sisagungun',         // 시사건건
  '@ohmynewstv',         // 오마이TV
  '@jtbcshow',           // 장르만 여의도
  '@newtamsa',           // 뉴탐사
  '@취재편의점',          // 장윤선의 취재편의점
  '@handoozani',         // 한두자니S2
  '@sisaineditor',       // 시사IN
  '@youngheefriends',    // 노영희티비(영친이들)
  '@sengjung-c4u',       // 우리들의 생활정치 (유용화)
  '@Cechil55',           // 시사져널 점성학 타로 Cecil (세실)
  '@백운기의정어리tv',     // 백운기의 정어리TV
];

// 목록 버전: 올리면 기존 브라우저도 이 기본 목록으로 1회 갱신됨
const CHANNELS_VERSION = '2026-06-22-v4';

let channels;
(function initChannels() {
  const storedVer = localStorage.getItem('yt_channels_version');
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored && storedVer === CHANNELS_VERSION) {
    channels = JSON.parse(stored);
  } else {
    channels = [...DEFAULT_CHANNELS];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(channels));
    localStorage.setItem('yt_channels_version', CHANNELS_VERSION);
  }
})();
let channelCache = {};
let refreshTimer;
let countdownVal = REFRESH_INTERVAL;
let isLoading = false;
let currentPeriod = 1; // 1 | 7 | 30

function todayKST() {
  const kst = new Date(Date.now() + 9 * 3600 * 1000);
  return kst.toISOString().split('T')[0];
}
function daysAgoKST(n) {
  const kst = new Date(Date.now() + 9 * 3600 * 1000 - n * 86400 * 1000);
  return kst.toISOString().split('T')[0];
}
function setPeriod(p) {
  currentPeriod = p;
  [1, 7, 30].forEach(n =>
    document.getElementById(`btn${n}d`).classList.toggle('active', n === p)
  );
  loadAll(true);
}

// 채널 패널 토글
function togglePanel() {
  const p = document.getElementById('channelPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  renderChannelTags();
}

function renderChannelTags() {
  const el = document.getElementById('channelTags');
  el.innerHTML = channels.map((ch, i) => `
    <div class="channel-tag">
      <span>${ch}</span>
      <span class="remove" onclick="removeChannel(${i})">✕</span>
    </div>
  `).join('');
}

function removeChannel(i) {
  channels.splice(i, 1);
  saveChannels();
  renderChannelTags();
  loadAll();
}

function addChannel() {
  const input = document.getElementById('newChannelInput');
  let val = input.value.trim();
  if (!val) return;
  if (!val.startsWith('@')) val = '@' + val;
  if (!channels.includes(val)) {
    channels.push(val);
    saveChannels();
    renderChannelTags();
    loadAll();
  }
  input.value = '';
}

function saveChannels() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(channels));
}

// API 호출
async function fetchJSON(url) {
  const res = await fetch(url);
  const data = await res.json();
  if (!res.ok) {
    const msg = data?.error?.message || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return data;
}

function getChInfoStore() {
  try { return JSON.parse(localStorage.getItem(CH_INFO_CACHE_KEY) || '{}'); } catch { return {}; }
}

async function getChannelInfo(handle) {
  // 1) 세션 메모리 캐시
  if (channelCache[handle]) return channelCache[handle];
  // 2) localStorage 영구 캐시 (API 키 변경 전까지 유효 — playlistId는 불변)
  const store = getChInfoStore();
  if (store[handle]) { channelCache[handle] = store[handle]; return store[handle]; }
  // 3) API 호출 (최초 1회만)
  const cleanHandle = handle.replace('@', '');
  const data = await fetchJSON(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails,snippet&forHandle=${encodeURIComponent(cleanHandle)}&key=${API_KEY}`
  );
  if (!data.items?.length) throw new Error(`채널을 찾을 수 없음`);
  const ch = data.items[0];
  const info = { name: ch.snippet.title, playlistId: ch.contentDetails.relatedPlaylists.uploads };
  channelCache[handle] = info;
  // localStorage 저장은 병렬 완료 후 배치로 (race condition 방지)
  return info;
}

// 날짜 문자열을 KST로 변환
function getKSTDateStr(isoString) {
  const d = new Date(new Date(isoString).getTime() + 9 * 3600 * 1000);
  return d.toISOString().split('T')[0];
}

async function getVideosInRange(playlistId, fromDate, toDate) {
  const videos = [];
  let pageToken = null;
  do {
    let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}`;
    if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;
    const data = await fetchJSON(url);
    let done = false;
    for (const item of data.items || []) {
      const d = getKSTDateStr(item.snippet.publishedAt);
      if (d < fromDate) { done = true; break; }
      if (d <= toDate) videos.push({
        id: item.snippet.resourceId.videoId,
        title: item.snippet.title,
        thumbnail: item.snippet.thumbnails?.medium?.url || '',
        publishedAt: new Date(item.snippet.publishedAt),
      });
    }
    pageToken = done ? null : data.nextPageToken;
  } while (pageToken && videos.length < 500);
  return videos;
}

async function getViewCounts(videoIds) {
  if (!videoIds.length) return {};
  const statsMap = {};
  for (let i = 0; i < videoIds.length; i += 50) {
    const chunk = videoIds.slice(i, i + 50).join(',');
    const data = await fetchJSON(
      `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${chunk}&key=${API_KEY}`
    );
    for (const item of data.items || []) {
      statsMap[item.id] = parseInt(item.statistics.viewCount || 0, 10);
    }
  }
  return statsMap;
}

// 포맷
function fmtViews(n) {
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
  if (n >= 10000)     return Math.round(n / 10000) + '만';
  if (n >= 1000)      return (n / 1000).toFixed(1) + '천';
  return n.toLocaleString();
}

function timeAgo(date) {
  const m = Math.floor((Date.now() - date) / 60000);
  if (m < 60)   return m + '분 전';
  if (m < 1440) return Math.floor(m / 60) + '시간 전';
  return Math.floor(m / 1440) + '일 전';
}

// 마스터 캐시: 당일 받은 "가장 넓은 기간" 영상 전체를 1벌만 저장.
// 오늘/7일/30일은 이 마스터에서 잘라내 보여줌 → 탭 전환 시 API 호출 0.
function saveMaster(periodCovered, videos, errors) {
  try {
    localStorage.setItem(VIDEO_CACHE_KEY, JSON.stringify({
      day: todayKST(),
      periodCovered,
      channelsKey: channels.join(','),
      fetchedAt: Date.now(),
      videos: videos.map(v => ({ ...v, publishedAt: v.publishedAt.toISOString() })),
      errors,
    }));
  } catch(e) {}
}

function loadMaster() {
  try {
    const raw = localStorage.getItem(VIDEO_CACHE_KEY);
    if (!raw) return null;
    const c = JSON.parse(raw);
    if (c.day !== todayKST()) return null;                  // 다음 날이면 miss
    if (c.channelsKey !== channels.join(',')) return null;  // 채널 바뀌면 miss
    return {
      periodCovered: c.periodCovered || 1,
      videos: c.videos.map(v => ({ ...v, publishedAt: new Date(v.publishedAt) })),
      errors: c.errors || [],
      fetchedAt: c.fetchedAt,
    };
  } catch(e) { return null; }
}

// 영상 집합에서 특정 기간(일수)의 탑 30개 잘라내기 (API 호출 없음)
function derivePeriod(videos, period) {
  const fromDate = daysAgoKST(period - 1);
  return videos
    .filter(v => getKSTDateStr(v.publishedAt.toISOString()) >= fromDate)
    .sort((a, b) => b.views - a.views)
    .slice(0, 30);
}

// 렌더 (캐시/신규 공통)
function renderResult(allVideos, errors, fetchedAtMs) {
  const contentEl  = document.getElementById('content');
  const summaryEl  = document.getElementById('summaryBar');
  const refreshBtn = document.getElementById('refreshBtn');

  const ts = new Date(fetchedAtMs);
  document.getElementById('lastUpdated').textContent =
    `업데이트: ${ts.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

  const periodLabel = currentPeriod === 1 ? '오늘' : `최근 ${currentPeriod}일`;
  summaryEl.textContent = `📹 총 ${allVideos.length}개 영상  ·  ${channels.length}개 채널  ·  ${periodLabel}`;

  let html = '<div class="video-list">';
  if (errors.length) {
    html += `<div class="error-box">⚠️ 오류: ${errors.join(' &nbsp;|&nbsp; ')}</div>`;
  }
  if (!allVideos.length) {
    html += `<div class="empty">📭 ${periodLabel} 업로드된 영상이 없습니다.</div>`;
  } else {
    allVideos.forEach((v, i) => {
      const n = i + 1;
      const rankClass = n === 1 ? 'gold' : n === 2 ? 'silver' : n === 3 ? 'bronze' : '';
      const rankLabel = n === 1 ? '🥇' : n === 2 ? '🥈' : n === 3 ? '🥉' : n;
      html += `
        <div class="video-card">
          <div class="rank ${rankClass}">${rankLabel}</div>
          <img class="thumb" src="${v.thumbnail}" alt="" loading="lazy" onerror="this.style.background='#1e1e1e';this.style.display='block'">
          <div class="info">
            <div class="channel-badge">${v.channelName}</div>
            <div class="video-title">
              <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">${v.title}</a>
            </div>
            <div class="stats">
              <span class="views">👁 ${fmtViews(v.views)}</span>
              <span>🕐 ${timeAgo(v.publishedAt)}</span>
              <button onclick="sendToAlphacut('${v.id}')" title="URL 복사 + 알파컷 열기" style="margin-left:auto; background:#2a1a2e; border:1px solid #4a2a52; color:#d090e0; border-radius:6px; padding:3px 10px; cursor:pointer; font-size:0.72rem;">✂️ 알파컷</button>
            </div>
          </div>
        </div>`;
    });
  }
  html += '</div>';
  contentEl.innerHTML = html;

  refreshBtn.disabled = false;
  isLoading = false;
}

// 메인 로드
async function loadAll(forceRefresh = false) {
  if (isLoading) return;
  if (!API_KEY) { showApiSetup(); return; }

  // 마스터 캐시가 현재 기간을 이미 포함하면 → API 호출 없이 잘라서 렌더
  if (!forceRefresh) {
    const master = loadMaster();
    if (master && master.periodCovered >= currentPeriod) {
      renderResult(derivePeriod(master.videos, currentPeriod), master.errors, master.fetchedAt);
      const remaining = Math.max(0, Math.floor((CACHE_TTL_MS - (Date.now() - master.fetchedAt)) / 1000));
      resetCountdown(remaining);
      return;
    }
  }

  // fetch 필요: 마스터가 줄어들지 않게 "현재 기간"과 "기존 마스터 기간" 중 넓은 쪽을 받음
  const existing = loadMaster();
  const fetchPeriod = Math.max(currentPeriod, existing ? existing.periodCovered : 0);
  const toDate   = todayKST();
  const fromDate = daysAgoKST(fetchPeriod - 1);
  const periodLabel = currentPeriod === 1 ? '오늘' : `최근 ${currentPeriod}일`;

  isLoading = true;
  const contentEl  = document.getElementById('content');
  const summaryEl  = document.getElementById('summaryBar');
  const refreshBtn = document.getElementById('refreshBtn');

  refreshBtn.disabled = true;
  contentEl.innerHTML = `<div class="loading"><div class="spinner"></div><div>${periodLabel} 영상 수집 중...</div></div>`;
  summaryEl.textContent = '';

  const allVideos = [];
  const errors = [];

  // 21개 채널 동시 병렬 fetch
  const settled = await Promise.allSettled(
    channels.map(async handle => {
      const info = await getChannelInfo(handle);
      const videos = await getVideosInRange(info.playlistId, fromDate, toDate);
      return videos.map(v => ({ ...v, channelName: info.name }));
    })
  );
  settled.forEach((r, i) => {
    if (r.status === 'fulfilled') allVideos.push(...r.value);
    else errors.push(`${channels[i]}: ${r.reason?.message || r.reason}`);
  });
  // 병렬 완료 후 channelCache 전체를 한 번에 localStorage 저장 (race condition 방지)
  try {
    const store = getChInfoStore();
    Object.assign(store, channelCache);
    localStorage.setItem(CH_INFO_CACHE_KEY, JSON.stringify(store));
  } catch {}

  // 조회수 일괄 조회
  if (allVideos.length) {
    const ids = allVideos.map(v => v.id);
    const statsMap = await getViewCounts(ids);
    allVideos.forEach(v => { v.views = statsMap[v.id] ?? 0; });
  }

  // 마스터엔 전체 보관(잘라내지 않음), 화면엔 현재 기간 탑 30만 표시
  const fetchedAt = Date.now();
  saveMaster(fetchPeriod, allVideos, errors);
  renderResult(derivePeriod(allVideos, currentPeriod), errors, fetchedAt);
  resetCountdown();
}

// 카운트다운
function resetCountdown(initialSec = REFRESH_INTERVAL) {
  clearInterval(refreshTimer);
  countdownVal = initialSec;
  const el = document.getElementById('countdown');

  // 캐시가 이미 30분 이상 됐으면 즉시 백그라운드 갱신 (화면은 캐시 유지)
  if (countdownVal <= 0) {
    el.textContent = '갱신 중...';
    loadAll(true);
    return;
  }

  // 초기값 즉시 표시
  const m0 = Math.floor(countdownVal / 60), s0 = countdownVal % 60;
  el.textContent = `다음 갱신까지 ${m0}:${String(s0).padStart(2, '0')}`;

  refreshTimer = setInterval(() => {
    countdownVal--;
    const m = Math.floor(countdownVal / 60);
    const s = countdownVal % 60;
    el.textContent = `다음 갱신까지 ${m}:${String(s).padStart(2, '0')}`;
    if (countdownVal <= 0) loadAll(true); // 타이머 만료 시 항상 강제 갱신
  }, 1000);
}

// 초기 실행
if (API_KEY) {
  loadAll();
} else {
  showApiSetup();
  document.getElementById('content').innerHTML =
    '<div class="empty">🔑 우측 상단 ⚙️ 에서 YouTube API 키를 입력하면 시작됩니다.</div>';
}
</script>
